name: Build Production Artifact

on:
    push:
        branches: [main, master]
    workflow_dispatch:

jobs:
    build-artefact:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Create production directory
              run: |
                  mkdir -p production-deploy

            - name: Build Docker image and save as tar
              run: |
                  docker build -t express-plate-front:latest .
                  docker save express-plate-front:latest -o production-deploy/app-image.tar

            - name: Copy project files
              run: |
                  cp start_nuxt_server.sh production-deploy/
                  cp -r docker/ production-deploy/ 2>/dev/null || true

            - name: Upload production image
              uses: actions/upload-artifact@v4
              with:
                  name: nuxt-server
                  path: production-deploy/
                  retention-days: 30
                  include-hidden-files: true
            